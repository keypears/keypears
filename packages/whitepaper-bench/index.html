<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>KeyPears PoW GPU Benchmark</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
    h1 { font-size: 18px; }
    #status { color: #aaa; margin: 20px 0; }

  <h1>KeyPears PoW GPU Benchmark</h1>
